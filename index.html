<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RYUTA Workspace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"DM Sans"', 'Inter', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
          },
          colors: {
            void: '#030308',
            panel: 'rgba(10, 12, 20, 0.72)',
            line: 'rgba(255, 255, 255, 0.06)',
            accent: '#22d3ee',
            accent2: '#a78bfa',
          },
          boxShadow: {
            panel: '0 0 0 1px rgba(255,255,255,0.06), 0 24px 80px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.04)',
            panelHover: '0 0 0 1px rgba(34, 211, 238, 0.22), 0 28px 90px rgba(0,0,0,0.65), inset 0 1px 0 rgba(255,255,255,0.06)',
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg0: #020208;
      --bg1: #070a12;
      --glow: rgba(200, 200, 200, 0.22);
      --grid: rgba(255, 255, 255, 0.035);
    }
    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg0);
      color: #e8e8ec;
      font-family: 'DM Sans', Inter, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }
    .font-mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

    /* 背景: ノイズ + グリッド（モノトーン） */
    .app-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(1200px 600px at 15% -10%, rgba(255, 255, 255, 0.08), transparent 55%),
        radial-gradient(900px 500px at 95% 10%, rgba(150, 150, 150, 0.08), transparent 50%),
        radial-gradient(700px 400px at 50% 100%, rgba(230, 230, 230, 0.05), transparent 45%),
        linear-gradient(180deg, var(--bg0) 0%, var(--bg1) 45%, #03040a 100%);
    }
    .app-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.35;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.55'/%3E%3C/svg%3E");
      mix-blend-mode: overlay;
    }
    .app-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse at 50% 30%, black 0%, transparent 72%);
      opacity: 0.55;
    }

    .pro-panel {
      position: relative;
      z-index: 1;
      background: rgba(10, 12, 20, 0.55);
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 18px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 24px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: border-color 0.35s ease, box-shadow 0.35s ease, transform 0.35s ease;
      min-width: 0;
      min-height: 0;
    }
    .pro-panel::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, rgba(255,255,255,0.18), transparent 40%, rgba(160,160,160,0.18));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      opacity: 0.45;
    }
    .pro-panel:hover {
      border-color: rgba(255, 255, 255, 0.18);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.10), 0 32px 100px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .pro-panel.focused-panel {
      position: fixed;
      inset: 1rem;
      z-index: 50;
      height: calc(100vh - 2rem);
      background: rgba(6, 8, 14, 0.92);
    }

    .focus-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: #e8e8ec;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s, background 0.2s, border-color 0.2s;
      z-index: 20;
    }
    .pro-panel:hover .focus-btn { opacity: 1; }
    .focus-btn:hover { background: rgba(255, 255, 255, 0.12); border-color: rgba(255, 255, 255, 0.28); }

    .task-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-left: 2px solid rgba(220, 220, 220, 0.35);
      border-radius: 12px;
      padding: 11px 14px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 8px;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      position: relative;
      z-index: 10;
    }
    .task-card:hover {
      background: rgba(255,255,255,0.05);
      border-color: rgba(255,255,255,0.1);
      transform: translateX(2px);
    }
    .task-checkbox {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 2px;
      transition: all 0.2s;
    }
    .task-checkbox:hover { border-color: #fff; background: rgba(255,255,255,0.08); }
    .task-checkbox::after { content: '✓'; font-size: 9px; color: #020208; opacity: 0; transition: opacity 0.2s; font-weight: 700; }
    .task-checkbox.done { background: linear-gradient(135deg, #f5f5f5, #9ca3af); border-color: transparent; }
    .task-checkbox.done::after { opacity: 1; }
    .task-card.done-card { border-left-color: transparent; opacity: 0.45; }
    .task-card.done-card:hover { opacity: 0.85; }

    .pro-input {
      width: 100%;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #f4f4f5;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 12px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.35);
    }
    .pro-input:focus {
      border-color: rgba(255, 255, 255, 0.40);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.10), inset 0 2px 8px rgba(0,0,0,0.35);
    }
    .pro-input.ai-loading {
      border-color: rgba(255, 255, 255, 0.35);
      color: #e5e7eb;
    }

    .tab-btn {
      font-size: 11px;
      font-weight: 600;
      color: #71717a;
      padding: 6px 14px;
      border-radius: 8px;
      transition: all 0.25s ease;
      cursor: pointer;
    }
    .tab-btn.active {
      color: #fafafa;
      background: rgba(255,255,255,0.08);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
    }
    .tab-btn:hover:not(.active) { color: #a1a1aa; }

    .iframe-wrapper {
      width: 100%;
      height: 100%;
      border-radius: inherit;
      overflow: hidden;
      filter: contrast(0.98) saturate(1.05);
      transition: filter 0.35s ease;
    }
    .iframe-wrapper:hover { filter: contrast(1) saturate(1.08); }

    #cmd-palette-overlay {
      position: fixed;
      inset: 0;
      background: rgba(2, 4, 12, 0.72);
      backdrop-filter: blur(10px);
      z-index: 100;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 15vh;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    #cmd-palette-overlay.active { opacity: 1; pointer-events: auto; }
    #cmd-palette {
      width: 100%;
      max-width: 520px;
      background: rgba(14, 16, 24, 0.92);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.65), 0 0 0 1px rgba(34,211,238,0.08);
      overflow: hidden;
      transform: scale(0.96) translateY(-8px);
      transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #cmd-palette-overlay.active #cmd-palette { transform: scale(1) translateY(0); }
    .cmd-item {
      padding: 12px 16px;
      color: #a1a1aa;
      font-size: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .cmd-item.selected, .cmd-item:hover {
      background: rgba(34, 211, 238, 0.08);
      color: #fafafa;
    }

    /* Apps リンク一覧（右上）：4分割グリッド内で高さ制限＋この中だけスクロール */
    #panel-apps .app-panel-bg {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: radial-gradient(ellipse at center, rgba(55, 55, 55, 0.32) 0%, #05060f 50%, #020208 100%);
      pointer-events: none;
      z-index: 0;
    }
    #panel-apps .app-panel-body {
      position: relative;
      z-index: 10;
      flex: 1 1 0;
      min-height: 0;
      min-width: 0;
      display: flex;
      flex-direction: column;
      padding: 10px 8px 10px 10px;
    }
    #app-list.app-link-grid {
      flex: 1 1 0;
      min-height: 0;
      min-width: 0;
      overflow-y: auto;
      overflow-x: hidden;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 8px;
      align-content: start;
      padding-right: 4px;
      scrollbar-width: auto;
      scrollbar-color: rgba(34, 211, 238, 0.55) rgba(255, 255, 255, 0.08);
    }
    #app-list.app-link-grid::-webkit-scrollbar {
      width: 12px;
    }
    #app-list.app-link-grid::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.07);
      border-radius: 999px;
      margin: 6px 2px;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    #app-list.app-link-grid::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, rgba(235, 235, 235, 0.55), rgba(145, 145, 145, 0.5));
      border-radius: 999px;
      border: 3px solid rgba(8, 10, 18, 0.95);
      min-height: 40px;
    }
    #app-list.app-link-grid::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, rgba(245, 245, 245, 0.85), rgba(180, 180, 180, 0.75));
    }
    #app-list.app-link-grid::-webkit-scrollbar-thumb:active {
      background: linear-gradient(180deg, rgba(255, 255, 255, 1), rgba(190, 190, 190, 0.9));
    }
    .app-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      min-width: 0;
      background: linear-gradient(90deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 8px 8px;
      transition: border-color 0.2s, transform 0.2s, background 0.2s;
      animation: app-row-appear 0.35s ease both;
    }
    .app-row:hover {
      border-color: rgba(255,255,255,0.24);
      background: linear-gradient(90deg, rgba(240,240,240,0.10), rgba(130,130,130,0.08));
      transform: translateX(1px);
    }
    .app-link {
      color: #e5e7eb;
      text-decoration: none;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.02em;
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      flex: 1;
      position: relative;
      z-index: 1;
    }
    .app-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      flex-shrink: 0;
      box-shadow: 0 0 12px currentColor;
      opacity: 0.95;
    }
    .app-name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .app-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .app-mini-btn {
      font-size: 10px;
      font-weight: 700;
      color: #e5e7eb;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.26);
      border-radius: 999px;
      padding: 2px 8px;
      text-decoration: none;
    }
    .app-keycap {
      font-size: 10px;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      color: #7dd3fc;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(125,211,252,0.25);
      border-radius: 6px;
      padding: 1px 6px;
    }
    @keyframes app-row-appear {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .mascot-wrapper {
      width: 68px;
      height: 68px;
      transform-origin: bottom center;
      filter: drop-shadow(0 12px 16px rgba(0,0,0,0.65));
    }
    @keyframes mascot-squish {
      0%, 100% { transform: scale(1, 1); }
      50% { transform: scale(1.04, 0.96); }
    }
    @keyframes mascot-jump {
      0%, 100% { transform: translateY(0) scale(1, 1); }
      30% { transform: translateY(-56px) scale(0.92, 1.08); }
      50% { transform: translateY(-64px) scale(0.96, 1.04); }
      70% { transform: translateY(-56px) scale(1, 1); }
      85% { transform: translateY(0) scale(1.12, 0.88); }
      95% { transform: translateY(0) scale(0.96, 1.04); }
    }
    @keyframes mascot-roll {
      0%, 100% { transform: translateX(0) rotate(0deg); }
      25% { transform: translateX(80px) rotate(360deg); }
      50% { transform: translateX(80px) rotate(360deg) scale(1.08, 0.92); }
      75% { transform: translateX(0) rotate(0deg); }
    }
    @keyframes mascot-dash {
      0%, 100% { transform: translateX(0) skewX(0); }
      15% { transform: translateX(-12px) skewX(12deg); }
      40% { transform: translateX(96px) skewX(-16deg); }
      60% { transform: translateX(96px) skewX(0); }
      85% { transform: translateX(0) skewX(12deg); }
    }
    .mascot-thinking #mascotBody { fill: url(#mascotGradThink) !important; }
    .mascot-thinking { animation: mascot-squish 0.3s ease-in-out infinite !important; }
    .mascot-fast { animation: mascot-squish 0.5s infinite ease-in-out !important; }
    .mascot-sleeping #mascotFace { opacity: 0; }
    .mascot-sleeping #mascotSleepFace { opacity: 1; }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(34, 211, 238, 0.35); }

    .sync-pill {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #52525b;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(0,0,0,0.25);
    }
    .sync-pill.ok { color: #5eead4; border-color: rgba(94, 234, 212, 0.35); }
    .sync-pill.err { color: #fda4af; border-color: rgba(253, 164, 175, 0.4); }
    .sync-pill.ok { color: #e5e7eb; border-color: rgba(255, 255, 255, 0.35); }
    .sync-pill.err { color: #d4d4d8; border-color: rgba(212, 212, 216, 0.35); }

    /* モノトーンUI強制（インラインTailwind色指定の上書き） */
    #panel-tasks button,
    #kansou-modal button,
    #tax-bubble button {
      color: #e5e7eb !important;
      background: rgba(255, 255, 255, 0.08) !important;
      border-color: rgba(255, 255, 255, 0.18) !important;
    }
    #report-preview-modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 210;
      background: rgba(2, 4, 12, 0.78);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    #report-preview-modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    #report-preview-modal {
      width: 100%;
      max-width: 720px;
      max-height: min(92vh, 820px);
      background: rgba(12, 14, 22, 0.97);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.65);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #report-preview-subject {
      font-size: 12px;
      font-weight: 600;
      color: #e4e4e7;
      line-height: 1.5;
      word-break: break-word;
    }
    #report-preview-body {
      flex: 1;
      min-height: 0;
      overflow: auto;
      background: #f8fafc;
      border-radius: 10px;
      padding: 12px;
      font-size: 11px;
    }
    #report-preview-plain {
      font-size: 11px;
      color: #a1a1aa;
      white-space: pre-wrap;
      line-height: 1.55;
      max-height: 120px;
      overflow-y: auto;
      padding: 8px 10px;
      background: rgba(0,0,0,0.35);
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    #kansou-modal textarea:focus,
    #kansou-modal input:focus,
    #tax-bubble input:focus {
      border-color: rgba(255, 255, 255, 0.42) !important;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.10) !important;
    }
    #kansou-modal .kansou-field-label,
    #tax-bubble .text-cyan-200,
    #tax-bubble .text-violet-200,
    #tax-bubble .text-emerald-200 {
      color: #d4d4d8 !important;
    }

    #kansou-modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(2, 4, 12, 0.75);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    #kansou-modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    #kansou-modal {
      width: 100%;
      max-width: 440px;
      max-height: min(90vh, 640px);
      background: rgba(12, 14, 22, 0.95);
      border: 1px solid rgba(34, 211, 238, 0.2);
      border-radius: 16px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .kansou-field-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #71717a;
      margin-bottom: 6px;
    }

    /* キャラ表示は隠し、反応ボタンのみ表示 */
    #ai-mascot-container {
      display: none;
    }
    #tax-mascot-container {
      position: absolute;
      right: 16px;
      bottom: 62px;
      z-index: 24;
      display: flex;
      flex-direction: column;
      align-items: center;
      user-select: none;
    }
    #ai-mascot,
    #mascot-bubble,
    #tax-mascot,
    #tax-bubble {
      pointer-events: auto;
    }
    #daily-react-btn {
      position: absolute;
      right: 92px;
      bottom: 16px;
      z-index: 35;
      border: 1px solid rgba(255,255,255,0.30);
      background: #ffffff;
      color: #111827;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 6px 10px;
      line-height: 1;
      cursor: pointer;
    }
    #tax-open-btn {
      position: absolute;
      right: 16px;
      bottom: 16px;
      z-index: 35;
      border: 1px solid rgba(255,255,255,0.30);
      background: #111111;
      color: #f5f5f5;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 6px 10px;
      line-height: 1;
      cursor: pointer;
    }
    .ruled-lines {
      line-height: 1.7;
      padding-top: 0.65em;
      background-size: 100% 1.7em;
      background-position: 0 0.65em;
      background-image: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.00) 0,
        rgba(255,255,255,0.00) calc(1.7em - 1px),
        rgba(255,255,255,0.10) calc(1.7em - 1px),

  <script>
    const SCHEDULE_URL = 'https://calendar.app.google/egS9bVik7BJTZ8Jb9';

      { category: 'tools', key: 'v', name: 'Vercel', url: 'https://vercel.com/new', color: 0xeeeeee },
      { category: 'tools', key: 'c', name: 'Canva', url: 'https://www.canva.com/', color: 0x00dfff },
      { category: 'tools', key: 'p', name: 'PT', url: 'https://reserve.joyfit.jp/', color: 0xff6600 },
      { category: 'tools', key: 'q', name: 'Querier', url: 'https://app.querier.io/', color: 0x8888ff }
    ];

    function renderAppLinks() {
      const list = document.getElementById('app-list');
      if (!list) return;
      list.innerHTML = '';

      apps.forEach(function (app, idx) {
        const row = document.createElement('div');
        row.className = 'app-row';
        row.setAttribute('role', 'listitem');
        row.style.animationDelay = (idx * 0.02) + 's';

        const colorHex = '#d4d4d8';
        const link = document.createElement('a');
        link.className = 'app-link';
        link.href = app.url;
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
        link.innerHTML =
          '<span class="app-dot" style="color:' + colorHex + '; background:' + colorHex + ';"></span>' +
          '<span class="app-name">' + app.name + '</span>';

        const actions = document.createElement('div');
        actions.className = 'app-actions';
        if (app.name === 'MAIL') {
          actions.innerHTML += '<span id="mail-badge" class="app-keycap" style="display:none;">0</span>';
        }
        if (app.name === 'Vercel' || app.name === 'PT') {
          actions.innerHTML += '<a class="app-mini-btn" href="' + SCHEDULE_URL + '" target="_blank" rel="noopener noreferrer">空き</a>';
        }
        if (app.key) {
          actions.innerHTML += '<span class="app-keycap">' + app.key.toUpperCase() + '</span>';
        }

        row.appendChild(link);
        row.appendChild(actions);
        list.appendChild(row);
      });
    }

    let mascotTimerId = null;
    let mascotStartTime = 0;
    let mascotElapsedTime = 0;
    let mascotState = 'idle';
    let taxMode = 'gross'; // gross | net
    let taxRate = 8;
    const DEFAULT_GYOMU_LINES = ['清掃業務', 'お客様対応', '事務作業'];

    function formatMascotTime(ms) {
      const totalSeconds = Math.floor(ms / 1000);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    }

    function updateMascotBubble() {
      const bubble = document.getElementById('mascot-bubble');
      if (mascotState === 'idle') {
        bubble.classList.remove('scale-100', 'opacity-100');
        bubble.classList.add('scale-95', 'opacity-0');
        setTimeout(function () { if (mascotState === 'idle') bubble.classList.add('hidden'); }, 200);
      } else if (mascotState === 'running') {
        bubble.classList.remove('hidden');
        setTimeout(function () {
          bubble.classList.remove('scale-95', 'opacity-0');
          bubble.classList.add('scale-100', 'opacity-100');
        }, 10);
        const currentElapsed = Date.now() - mascotStartTime;
        bubble.innerHTML = '<span class="font-mono text-[14px] font-semibold text-zinc-200">' + formatMascotTime(currentElapsed) + '</span>';
      } else if (mascotState === 'stopped') {
        bubble.classList.remove('hidden', 'scale-95', 'opacity-0');
        bubble.classList.add('scale-100', 'opacity-100');
        const timeStr = formatMascotTime(mascotElapsedTime);
        bubble.innerHTML =
          '<div class="flex flex-col items-center gap-1">' +
          '<span class="text-[9px] text-zinc-300 font-bold tracking-wider uppercase">Measured</span>' +
          '<span class="font-mono text-[14px] font-semibold text-zinc-100 leading-none mb-1">' + timeStr + '</span>' +
          '<button type="button" onclick="resetMascotTimer(event)" class="text-[10px] font-bold bg-white/10 text-zinc-200 px-3 py-1 rounded-lg border border-white/25 hover:bg-white/20 transition-colors">RESET</button>' +
          '</div>';
      }
    }

    function handleMascotClick() {
      const mascot = document.getElementById('ai-mascot');
      if (!mascot) return;
      if (mascotState === 'idle') {
        mascotStartTime = Date.now();
        mascotState = 'running';
        mascotTimerId = setInterval(updateMascotBubble, 1000);
        updateMascotBubble();
        mascot.classList.add('mascot-fast');
        mascot.classList.remove('mascot-sleeping');
        mascot.style.animation = '';
      } else if (mascotState === 'running') {
        clearInterval(mascotTimerId);
        mascotElapsedTime = Date.now() - mascotStartTime;
        mascotState = 'stopped';
        updateMascotBubble();
        mascot.classList.remove('mascot-fast');
      }
    }

    function calcTaxView() {
      var input = document.getElementById('tax-input');
      var netEl = document.getElementById('tax-net');
      var taxEl = document.getElementById('tax-tax');
      var grossEl = document.getElementById('tax-gross');
      if (!input || !netEl || !taxEl || !grossEl) return;
      var v = Number(input.value || 0);
      if (!Number.isFinite(v) || v < 0) v = 0;

      var net = 0;
      var gross = 0;
      var tax = 0;
      if (taxMode === 'gross') {
        gross = v;
        net = Math.floor(gross / (1 + taxRate / 100));
        tax = gross - net;
      } else {
        net = v;
        tax = Math.floor(net * taxRate / 100);
        gross = net + tax;
      }
      netEl.textContent = formatYen(net);
      taxEl.textContent = formatYen(tax);
      grossEl.textContent = formatYen(gross);
    }

    function setTaxMode(nextMode) {
      taxMode = nextMode;

      var b2 = document.getElementById('tax-mode-net');

        b1.style.borderColor = nextMode === 'gross' ? 'rgba(255,255,255,0.45)' : 'rgba(255,255,255,0.15)';
        b1.style.background = nextMode === 'gross' ? 'rgba(255,255,255,0.14)' : 'rgba(255,255,255,0.05)';
        b2.style.borderColor = nextMode === 'net' ? 'rgba(255,255,255,0.45)' : 'rgba(255,255,255,0.15)';
        b2.style.background = nextMode === 'net' ? 'rgba(255,255,255,0.14)' : 'rgba(255,255,255,0.05)';
      }
      calcTaxView();
    }

    function renderTasks() {

          '<div class="task-checkbox" onclick="completeTask(' + index + ')"></div>' +
          '<div class="flex-1 text-xs text-zinc-300 outline-none leading-relaxed" contenteditable="true" onblur="editTask(event, \'active\', ' + index + ')" onkeydown="handleTaskEditKey(event)">' +
          escapeHtml(task) + '</div>';
        inboxContainer.appendChild(div);
      });
      doneContainer.innerHTML = '';
      finishedTasks.forEach(function (task, index) {
        const div = document.createElement('div');
        div.className = 'task-card done-card';
        div.innerHTML =
          '<div class="task-checkbox done" onclick="undoTask(' + index + ')"></div>' +
          '<div class="flex-1 text-xs text-zinc-500 line-through outline-none leading-relaxed" contenteditable="true" onblur="editTask(event, \'done\', ' + index + ')" onkeydown="handleTaskEditKey(event)">' +

    function editTask(event, type, index) {
      const newText = event.target.textContent.trim();
      if (newText === '') {
        if (type === 'active') activeTasks.splice(index, 1);
        else finishedTasks.splice(index, 1);
      } else {
        if (type === 'active') activeTasks[index] = newText;
        else finishedTasks[index] = newText;
      }
      saveTasks();
      renderTasks();
    }

    function handleTaskEditKey(event) {
      if (event.key === 'Enter') {
        event.preventDefault();
        event.target.blur();
      }
    }

    function completeTask(index) {
      finishedTasks.push(activeTasks.splice(index, 1)[0]);
      saveTasks();
      renderTasks();
    }

    function undoTask(index) {
      activeTasks.push(finishedTasks.splice(index, 1)[0]);
      saveTasks();
      renderTasks();

    function normalizeGyomuLine_(line) {
      return String(line || '')
        .replace(/^[・\-•\s]+/, '')
        .trim();
    }

    function parseGyomuLines_(raw) {
      if (!raw) return [];
      return String(raw)
        .replace(/\r\n/g, '\n')
        .split('\n')
        .map(normalizeGyomuLine_)
        .filter(function (v) { return !!v; });
    }

    function copyTasks() {
      if (finishedTasks.length === 0) return;
      const textToCopy = '【完了したタスク】\n' + finishedTasks.map(function (t) { return '・' + t; }).join('\n');
      navigator.clipboard.writeText(textToCopy).then(function () {
        const btn = document.querySelector('button[onclick="copyTasks()"]');
        if (!btn) return;
        const orig = btn.textContent;
        btn.textContent = 'COPIED';
        btn.classList.add('text-cyan-300');
        setTimeout(function () {
          btn.textContent = orig;
          btn.classList.remove('text-cyan-300');
        }, 2000);
      }).catch(function () {
        const ta = document.createElement('textarea');
        ta.value = textToCopy;
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); } catch (e) {}
        document.body.removeChild(ta);
      });
    }

      filteredApps = apps.filter(function (app) { return app.name.toLowerCase().includes(q); });
      cmdList.innerHTML = '';
      selectedIndex = 0;
      if (filteredApps.length === 0) {
        cmdList.innerHTML = '<div class="px-4 py-3 text-xs text-zinc-600">No results — Enter adds task</div>';
        return;
      }
      filteredApps.forEach(function (app, index) {
        const div = document.createElement('div');
        div.className = 'cmd-item' + (index === 0 ? ' selected' : '');
        div.innerHTML = '<span>' + escapeHtml(app.name) + '</span><span class="text-[10px] text-zinc-600 font-mono">Open</span>';
        div.onmouseover = function () {
          document.querySelectorAll('.cmd-item').forEach(function (el) { el.classList.remove('selected'); });
          div.classList.add('selected');
          selectedIndex = index;
        };
        div.onclick = function () { executeCmd(); };
        cmdList.appendChild(div);
      });
    }

    function executeCmd() {
      if (filteredApps.length > 0) {
        const a = document.createElement('a');
        a.href = filteredApps[selectedIndex].url;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      } else if (cmdInput.value.trim() !== '') {
        processInputWithoutAI(cmdInput.value);
      }
      closeCmdPalette();
    }

    cmdInput.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') closeCmdPalette();
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        selectedIndex = (selectedIndex + 1) % Math.max(filteredApps.length, 1);
        updateCmdSelection();
      }
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        selectedIndex = (selectedIndex - 1 + Math.max(filteredApps.length, 1)) % Math.max(filteredApps.length, 1);
        updateCmdSelection();
      }
      if (e.key === 'Enter') {
        e.preventDefault();
        executeCmd();
      }
    });
    cmdInput.addEventListener('input', function (e) {
      renderCmdList(e.target.value);
    });

    function updateCmdSelection() {
      const items = document.querySelectorAll('.cmd-item');
      items.forEach(function (item, index) {
        if (index === selectedIndex) {
          item.classList.add('selected');
          item.scrollIntoView({ block: 'nearest' });
        } else item.classList.remove('selected');
      });
    }

    document.addEventListener('keydown', function (e) {
      var reportOv = document.getElementById('report-preview-modal-overlay');
      if (reportOv && reportOv.classList.contains('active') && e.key === 'Escape') {
        closeReportPreviewModal();
        return;
      }
      var kansouOv = document.getElementById('kansou-modal-overlay');
      if (kansouOv && kansouOv.classList.contains('active') && e.key === 'Escape') {
        closeKansouModal();
        return;
      }
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        openCmdPalette();
        return;
      }
      if (cmdOverlay.classList.contains('active')) return;
      if (e.key === 'Escape' && currentFocused) {
        toggleFocus(currentFocused.id);
        return;
      }
      const tag = document.activeElement.tagName.toLowerCase();
      if (tag === 'input' || tag === 'textarea' || document.activeElement.isContentEditable) return;
      const openTab = function (url) {
        const a = document.createElement('a');
        a.href = url;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      };
      const k = e.key.toLowerCase();
      const target = apps.find(function (app) { return app.key === k; });
      if (target && target.url) openTab(target.url);
    });

    function loadDataFromGAS() {
      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(function (unreadCount) {
            const badge = document.getElementById('mail-badge');
            if (badge && unreadCount > 0) {
              badge.textContent = unreadCount;
              badge.classList.remove('hidden');
            }
          })
          .getUnreadEmailCount();
      }
    }

    cmdOverlay.addEventListener('click', function (e) {
      if (e.target === cmdOverlay) closeCmdPalette();
    });

    window.onload = function () {
      renderAppLinks();
      loadDataFromGAS();
      loadFromSheet();
      renderTasks();
      fillMainEditorsFromState_();
      setupAiMascotClick();
      setupTaxMascot();
      setSyncStatus(typeof google !== 'undefined' && google.script ? '…' : 'LOCAL', '');
      setTimeout(randomMascotAction, 2200);
      var mainKansou = document.getElementById('kansou-main-input');
      if (mainKansou) mainKansou.focus();
    };
  </script>
</body>
</html>
